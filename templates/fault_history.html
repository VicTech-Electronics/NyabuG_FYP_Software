{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fault History</title>
	<style>
		body {
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            flex-direction: column;
            align-items: center;
            background-image: url("{% static '/images/aircondition.webp' %}");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        body::after {
            content: "";
            margin: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            display: block;
            background: #ffffffdd;
            z-index: -1;
        }

        .go-back{
            position: absolute;
            top: 2rem;
            left: 2rem;
        }

        .go-back button{
            border: 1px solid #1f799a;
            border-radius: .5rem;
            font-size: 1.2rem;
            font-weight: bold;
            padding: .2rem .5rem;
            color: #1f799a;
            cursor: pointer;
        }

        .title{
            font-size: 3rem;
            margin: 1rem;
        }

        .title .title1{
            color: gray;
        }

        .title .title2{
            color: #1f799a;
        }

        .device_id{
        	width: 80%;
        }

        .fault-table {
        	width: 80%;
    		border-collapse: collapse;
    		margin: .4rem 0;
    		font-family: Arial, sans-serif;
    		font-size: 0.9rem;
    		box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .fault-table thead {
        	background-color: #1f799a;

        	color: white;
        }

        .fault-table th,
        .fault-table td {
        	padding: 10px 15px;
    		text-align: center;
        }

        .fault-table tbody tr {
        	border-bottom: 1px solid #dddddd;
        }

        .fault-table tbody tr:nth-child(even) {
        	background-color: #f3f3f3;
        }

        .fault-table tbody tr:hover {
    		background-color: #e0f3f9;
		}

		.fault-table tbody button{
			font-weight: bold;
			border-radius: .4rem;
			background-color: red;
			color: white;
			cursor: pointer;
			width: 90%;
		}
	</style>
</head>
<body>
	<form class="go-back" method="get" action="{% url 'dashboard' %}">
        <button type="submit">BACK</button>
    </form>

	<div class="title">
        <strong class="title1">FAULTS</strong>
        <strong class="title2">HISTORY</strong>
    </div>


    <div class="device_id">
    		<strong>Device ID:</strong>  {{device_id}}
    </div>
  
	<table class="fault-table">
		<thead>
		<tr>
			<th>FAULT TYPE</th>
			<th>VIBRATION <small class="subscript">(%)</small></th>
			<th>NOISE <small class="subscript">(db)</small></th>
			<th>TIME <small class="subscript">(Date | 24hrs)</small></th>
			<th>REACTION</th>
		</tr>
		</thead>
		<tbody>
		{% for fault in faults %}
		<tr>
			<td>{{fault.fault_type}}</td>
			<td>{{fault.vibration_during_fault}}</td>
			<td>{{fault.noise_during_fault}}</td>
			<td>{{fault.time}}</td>
			<td>
				<form>
					{% csrf_token %}
					<input type="hidden" name="fault_id" value="{{fault.pk}}">
					<button type="submit">DELETE</button>
				</form>
			</td>
		</tr>
		{% endfor %}
		</tbody>
	</table>
</body>
</html>
